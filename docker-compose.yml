services:
  web:
    build: .
    container_name: litreview-web
    command: npm start
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      APP_URL: ${APP_URL:-http://localhost:3000}
      STORE_PATH: ${STORE_PATH:-/app/data/store.json}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  runner-scout:
    build: .
    container_name: litreview-runner-scout
    command: sh -lc "node scripts/agent_runner.js 2>&1 | tee -a /app/logs/runner-scout.log"
    depends_on:
      web:
        condition: service_healthy
    environment:
      MODE: scout
      RUNNER_ID: runner-scout-docker
      BASE: http://web:3000
      LITREV_API_KEY: ${LITREV_SCOUT_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_ENABLE_WEB_SEARCH: ${OPENAI_ENABLE_WEB_SEARCH:-1}
      AUTO_INGEST_URLS: ${AUTO_INGEST_URLS:-1}
      DEMO_MODE: ${DEMO_MODE:-1}
      POLL_SECONDS: ${POLL_SECONDS:-1}
      MIN_SECONDS_BETWEEN_POSTS: ${MIN_SECONDS_BETWEEN_POSTS:-2}
      MOCK_OPENAI: ${MOCK_OPENAI:-0}
    volumes:
      - ./logs:/app/logs

  runner-summarizer:
    build: .
    container_name: litreview-runner-summarizer
    command: sh -lc "node scripts/agent_runner.js 2>&1 | tee -a /app/logs/runner-summarizer.log"
    depends_on:
      web:
        condition: service_healthy
      runner-scout:
        condition: service_started
    environment:
      MODE: summarizer
      RUNNER_ID: runner-summarizer-docker
      BASE: http://web:3000
      LITREV_API_KEY: ${LITREV_SUMMARIZER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_ENABLE_WEB_SEARCH: ${OPENAI_ENABLE_WEB_SEARCH:-1}
      AUTO_INGEST_URLS: ${AUTO_INGEST_URLS:-1}
      DEMO_MODE: ${DEMO_MODE:-1}
      POLL_SECONDS: ${POLL_SECONDS:-1}
      MIN_SECONDS_BETWEEN_POSTS: ${MIN_SECONDS_BETWEEN_POSTS:-2}
      MOCK_OPENAI: ${MOCK_OPENAI:-0}
    volumes:
      - ./logs:/app/logs

  runner-critic:
    build: .
    container_name: litreview-runner-critic
    command: sh -lc "node scripts/agent_runner.js 2>&1 | tee -a /app/logs/runner-critic.log"
    depends_on:
      web:
        condition: service_healthy
      runner-scout:
        condition: service_started
    environment:
      MODE: critic
      RUNNER_ID: runner-critic-docker
      BASE: http://web:3000
      LITREV_API_KEY: ${LITREV_CRITIC_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_ENABLE_WEB_SEARCH: ${OPENAI_ENABLE_WEB_SEARCH:-1}
      AUTO_INGEST_URLS: ${AUTO_INGEST_URLS:-1}
      DEMO_MODE: ${DEMO_MODE:-1}
      POLL_SECONDS: ${POLL_SECONDS:-1}
      MIN_SECONDS_BETWEEN_POSTS: ${MIN_SECONDS_BETWEEN_POSTS:-2}
      MOCK_OPENAI: ${MOCK_OPENAI:-0}
    volumes:
      - ./logs:/app/logs

  runner-builder:
    build: .
    container_name: litreview-runner-builder
    command: sh -lc "node scripts/agent_runner.js 2>&1 | tee -a /app/logs/runner-builder.log"
    depends_on:
      web:
        condition: service_healthy
      runner-scout:
        condition: service_started
    environment:
      MODE: builder
      RUNNER_ID: runner-builder-docker
      BASE: http://web:3000
      LITREV_API_KEY: ${LITREV_BUILDER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_ENABLE_WEB_SEARCH: ${OPENAI_ENABLE_WEB_SEARCH:-1}
      AUTO_INGEST_URLS: ${AUTO_INGEST_URLS:-1}
      DEMO_MODE: ${DEMO_MODE:-1}
      POLL_SECONDS: ${POLL_SECONDS:-1}
      MIN_SECONDS_BETWEEN_POSTS: ${MIN_SECONDS_BETWEEN_POSTS:-2}
      MOCK_OPENAI: ${MOCK_OPENAI:-0}
    volumes:
      - ./logs:/app/logs

  runner-curator:
    build: .
    container_name: litreview-runner-curator
    command: sh -lc "node scripts/agent_runner.js 2>&1 | tee -a /app/logs/runner-curator.log"
    depends_on:
      web:
        condition: service_healthy
      runner-summarizer:
        condition: service_started
      runner-critic:
        condition: service_started
    environment:
      MODE: curator
      RUNNER_ID: runner-curator-docker
      BASE: http://web:3000
      LITREV_API_KEY: ${LITREV_CURATOR_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_ENABLE_WEB_SEARCH: ${OPENAI_ENABLE_WEB_SEARCH:-0}
      AUTO_INGEST_URLS: ${AUTO_INGEST_URLS:-1}
      DEMO_MODE: ${DEMO_MODE:-1}
      POLL_SECONDS: ${POLL_SECONDS:-1}
      MIN_SECONDS_BETWEEN_POSTS: ${MIN_SECONDS_BETWEEN_POSTS:-2}
      MOCK_OPENAI: ${MOCK_OPENAI:-0}
    volumes:
      - ./logs:/app/logs

  runner-writer:
    build: .
    container_name: litreview-runner-writer
    command: sh -lc "node scripts/agent_runner.js 2>&1 | tee -a /app/logs/runner-writer.log"
    depends_on:
      web:
        condition: service_healthy
      runner-curator:
        condition: service_started
    environment:
      MODE: writer
      RUNNER_ID: runner-writer-docker
      BASE: http://web:3000
      LITREV_API_KEY: ${LITREV_WRITER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_ENABLE_WEB_SEARCH: ${OPENAI_ENABLE_WEB_SEARCH:-0}
      AUTO_INGEST_URLS: ${AUTO_INGEST_URLS:-1}
      DEMO_MODE: ${DEMO_MODE:-1}
      POLL_SECONDS: ${POLL_SECONDS:-1}
      MIN_SECONDS_BETWEEN_POSTS: ${MIN_SECONDS_BETWEEN_POSTS:-2}
      MOCK_OPENAI: ${MOCK_OPENAI:-0}
    volumes:
      - ./logs:/app/logs
